<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dicee Game</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css?family=Indie+Flower|Lobster" rel="stylesheet" />

</head>

<body>
  <div class="container">
    <h1 id="game-title">Roll the Dice!</h1>

    <div class="dice">
      <p>Player 1</p>
      <img src="./images/dice6.png" alt="dice6" class="img1">
    </div>
    <div class="dice">
      <p>Player 2</p>
      <img src="./images/dice6.png" alt="dice6" class="img2">
    </div>
    <button onclick="rollDice()">🎲 Roll the Dice 🎲</button>
  </div>

  <footer>🎲 Roll the Dice & Have Fun 🎲</footer>

  <script src="index.js"></script>
</body>

</html>
